[pytest]
# Keep pytest's tmp_path fixtures inside the repository. Some locked-down
# Windows environments deny access to the default %LOCALAPPDATA%\Temp root.
norecursedirs = pytest-temp .pytest-runtime .pytest_cache
addopts = -p no:cacheprovider
filterwarnings =
    ignore:Protobuf gencode version 5\.28\.3 is exactly one major version older than the runtime version.*:UserWarning:google\.protobuf\.runtime_version
